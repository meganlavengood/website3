  <title>The Timbre Is the Instrument (Lavengood)</title>
  <meta name="citation_title" content="The Timbre Is the Instrument: The Imagined DX7 and 1980s Nostalgia">
  <meta name="citation_author" content="Lavengood, Megan L.">
  <meta name="citation_conference_title" content="Society for American Music 52nd Annual Conference">
  <meta name="citation_abstract" content="Timbre is a significant part of an instrument’s identity in popular culture; often, the timbre is how we identify an instrument aurally in the absence of any visual cues. But Fales (2002) famously notes a paradox of timbre: our ability to identify sound sources is flawed and culturally situated, and if a sound-source identification accords with the environment and with the perception of our fellow listeners, we have no reason to worry about our accuracy. In the age of the Digital Audio Workstation (DAW), anyone identifying a sound source in a song experiences this paradox, knowingly or not. Given the unknowability of a sound source, I argue that analysts should focus more on what the sound signifies, rather than how it was produced. As a case study, I focus on “the imagined Yamaha DX7”: a version of the actual hardware instrument, augmented by the many sounds and features attributed to it in casual conversations about music. As the 1980s cycled back into style in the late 2010s, DX7-esque electric piano sounds resurged in popularity, further building out the imagined DX7. I focus on “Versace on the Floor” from Bruno Mars’s triple-platinum album 24k Magic (2017), a prominent example of 21st-century DX7 electric piano. Beyond simply discussing the significance of the DX7 E. PIANO 1 sound, I use this chapter to show what popular perceptions of timbre can reveal about the cultural meaning of an instrument.Timbre is a significant part of an instrument’s identity in popular culture; often, the timbre is how we identify an instrument aurally in the absence of any visual cues. But Fales (2002) famously notes a paradox of timbre: our ability to identify sound sources is flawed and culturally situated, and if a sound-source identification accords with the environment and with the perception of our fellow listeners, we have no reason to worry about our accuracy. In the age of the Digital Audio Workstation (DAW), anyone identifying a so
