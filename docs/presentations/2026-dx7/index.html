  <title>The Timbre Is the Instrument (Lavengood)</title>
  <meta name="citation_title" content="The Timbre Is the Instrument: The Imagined DX7 and 1980s Nostalgia">
  <meta name="citation_author" content="Lavengood, Megan L.">
  <meta name="citation_conference_title" content="The 4th International Conference on Timbre">
  <meta name="citation_abstract" content="This paper uses “Versace on the Floor” by Bruno Mars (2016) and the Yamaha DX7 E. PIANO 1 sound to illustrate the problems one might encounter when researching synthesizers in recent popular music. I argue that researchers don’t need to think of accurate instrument identification as a prerequisite for analyzing a song’s use of that instrument, because it’s already significant that the timbre suggests the instrument. I support this through my case study of the Imagined DX7: the DX7 as it lives in popular consciousness, derived from memories and imaginings of its most well-known and imitated factory presets. I explore how the E. PIANO 1 preset outgrew the DX7, complicating the sonic identity of the instrument, but simultaneously solidifying a certain timbral signature that captures the essence of the instrument. I also discuss the technological changes—MIDI and the decline of the music trade magazine—that take away sources of truth for identifying instruments, a process that begins in the 1980s and continues to the present day. By considering timbre as the instrument, I show how researchers can analyze synthesizers in recent pop music through intertextuality and listener reception, areas that are unaffected or even enriched by possible inaccuracies in the instrument identification.">
  <meta name="citation_date" content="July 3, 2026">
